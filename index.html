<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;}
.container{max-width:960px;margin:0 auto;padding:2rem 1.25rem;}

.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px;}
.header-left h1{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
.header-left p{font-size:14px;color:#888;margin-top:3px;}
.header-right{display:flex;gap:8px;}
.sync-btn{padding:10px 16px;background:#fff;color:#1a1a1a;border:1px solid #e5e5e5;border-radius:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;}
.sync-btn:hover{background:#f5f5f5;}
.sync-btn.loading{opacity:0.6;pointer-events:none;}
.add-btn{padding:10px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;}
.add-btn:hover{background:#333;}

.summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem;}
@media(max-width:520px){.summary-cards{grid-template-columns:1fr;}}
.s-card{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #eee;}
.s-card .label{font-size:12px;color:#999;margin-bottom:6px;}
.s-card .value{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.s-card .sub{font-size:12px;color:#aaa;margin-top:3px;}
.s-card.income .value{color:#2DB38A;}
.s-card.expense .value{color:#D45D7E;}

.chart-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:2rem;}
@media(max-width:560px){.chart-section{grid-template-columns:1fr;}}
.chart-card{background:#fff;border-radius:14px;padding:1.5rem;border:1px solid #eee;}
.chart-top{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.badge.income{background:#D4F3E8;color:#1A8A63;}
.badge.expense{background:#FAD4DE;color:#A83050;}
.chart-top h3{font-size:14px;font-weight:500;color:#555;}
.chart-wrap{position:relative;height:190px;}
.legend{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:12px;}
.legend-left{display:flex;align-items:center;gap:7px;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.legend-name{color:#666;}
.legend-pct{color:#1a1a1a;font-weight:500;}
.drill-hint{font-size:11px;color:#bbb;text-align:center;margin-top:8px;}
.drill-hint.clickable{cursor:pointer;color:#888;text-decoration:underline;}
.drill-hint.clickable:hover{color:#333;}

.table-section{margin-bottom:2rem;}
.table-section h2{font-size:16px;font-weight:700;margin-bottom:12px;}
.table-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #eee;}
.table-header{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 1fr;gap:8px;padding:12px 20px;background:#fafafa;border-bottom:1px solid #eee;font-size:11px;font-weight:500;color:#aaa;}
.table-row{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 1fr;gap:8px;padding:13px 20px;border-bottom:1px solid #f5f5f5;font-size:13px;align-items:center;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:#fafafa;}
.row-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-amount.income{font-weight:700;color:#2DB38A;}
.row-amount.expense{font-weight:700;color:#D45D7E;}
.cat-badge{font-size:11px;padding:3px 9px;border-radius:20px;display:inline-block;white-space:nowrap;}
.row-sub{font-size:12px;color:#999;}
.row-date-del{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.row-date{font-size:12px;color:#bbb;}
.delete-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px;}
.delete-btn:hover{color:#e53935;}
.empty-state{padding:3rem;text-align:center;font-size:14px;color:#bbb;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:18px;padding:2rem;width:360px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-header h2{font-size:17px;font-weight:700;}
.type-toggle{display:flex;background:#f5f5f5;border-radius:10px;padding:3px;gap:3px;}
.type-btn{flex:1;padding:6px 14px;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;background:transparent;color:#888;}
.type-btn.active.income{background:#2DB38A;color:#fff;}
.type-btn.active.expense{background:#D45D7E;color:#fff;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:6px;font-weight:500;}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1px solid #e5e5e5;border-radius:10px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fafafa;outline:none;transition:border 0.15s;}
.form-group input:focus,.form-group select:focus{border-color:#1a1a1a;background:#fff;}
.modal-actions{display:flex;gap:8px;margin-top:1.5rem;}
.btn-cancel{flex:1;padding:11px;background:#f5f5f5;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;color:#666;}
.btn-save{flex:2;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;}
.btn-save.income{background:#2DB38A;}
.btn-save.expense{background:#D45D7E;}
.btn-save:disabled{background:#999;cursor:not-allowed;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>가계부 💳</h1>
      <p id="period-label"></p>
    </div>
    <div class="header-right">
      <button class="sync-btn" id="syncBtn" onclick="loadFromSheet()">🔄 불러오기</button>
      <button class="add-btn" onclick="openModal()">＋ 내역 추가</button>
    </div>
  </div>

  <div class="summary-cards">
    <div class="s-card income">
      <div class="label">총 소득</div>
      <div class="value" id="total-income">0원</div>
      <div class="sub" id="income-count">0건</div>
    </div>
    <div class="s-card expense">
      <div class="label">총 지출</div>
      <div class="value" id="total-expense">0원</div>
      <div class="sub" id="expense-count">0건</div>
    </div>
    <div class="s-card">
      <div class="label">순이익</div>
      <div class="value" id="net-amount">0원</div>
      <div class="sub" id="net-label"></div>
    </div>
  </div>

  <!-- 메인 차트: 소득(왼쪽) / 지출(오른쪽) -->
  <div class="chart-section">
    <div class="chart-card">
      <div class="chart-top"><span class="badge income">소득</span><h3 id="income-main-title">대분류별 소득</h3></div>
      <div class="chart-wrap"><canvas id="incomeMainChart"></canvas></div>
      <div class="legend" id="income-main-legend"></div>
      <p class="drill-hint">항목을 클릭하면 소분류를 볼 수 있어요</p>
    </div>
    <div class="chart-card">
      <div class="chart-top"><span class="badge expense">지출</span><h3 id="expense-main-title">대분류별 지출</h3></div>
      <div class="chart-wrap"><canvas id="expenseMainChart"></canvas></div>
      <div class="legend" id="expense-main-legend"></div>
      <p class="drill-hint">항목을 클릭하면 소분류를 볼 수 있어요</p>
    </div>
  </div>

  <!-- 소분류 차트 (클릭 시 표시) -->
  <div class="chart-section" id="sub-chart-section" style="display:none">
    <div class="chart-card" id="income-sub-card" style="display:none">
      <div class="chart-top"><span class="badge income">소득</span><h3 id="income-sub-title">소분류</h3></div>
      <div class="chart-wrap"><canvas id="incomeSubChart"></canvas></div>
      <div class="legend" id="income-sub-legend"></div>
      <p class="drill-hint clickable" onclick="resetChart('income')">← 전체 보기</p>
    </div>
    <div class="chart-card" id="expense-sub-card" style="display:none">
      <div class="chart-top"><span class="badge expense">지출</span><h3 id="expense-sub-title">소분류</h3></div>
      <div class="chart-wrap"><canvas id="expenseSubChart"></canvas></div>
      <div class="legend" id="expense-sub-legend"></div>
      <p class="drill-hint clickable" onclick="resetChart('expense')">← 전체 보기</p>
    </div>
  </div>

  <!-- 소득 테이블 -->
  <div class="table-section">
    <h2>💚 소득 내역</h2>
    <div class="table-card">
      <div class="table-header"><span>내역</span><span>금액</span><span>대분류</span><span>소분류</span><span>날짜</span></div>
      <div id="income-table"></div>
    </div>
  </div>

  <!-- 지출 테이블 -->
  <div class="table-section">
    <h2>❤️ 지출 내역</h2>
    <div class="table-card">
      <div class="table-header"><span>내역</span><span>금액</span><span>대분류</span><span>소분류</span><span>날짜</span></div>
      <div id="expense-table"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>내역 추가</h2>
      <div class="type-toggle">
        <button class="type-btn active income" id="typeIncome" onclick="setType('income')">소득</button>
        <button class="type-btn" id="typeExpense" onclick="setType('expense')">지출</button>
      </div>
    </div>
    <div class="form-group"><label>내역</label><input type="text" id="f-name" placeholder="예: 월급" /></div>
    <div class="form-group"><label>금액 (원)</label><input type="number" id="f-amount" placeholder="예: 3000000" min="0" /></div>
    <div class="form-group"><label>대분류</label><select id="f-main" onchange="updateSubOptions()"><option value="">선택하세요</option></select></div>
    <div class="form-group"><label>소분류</label><select id="f-sub"><option value="">먼저 대분류를 선택하세요</option></select></div>
    <div class="form-group"><label>날짜</label><input type="date" id="f-date" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save income" id="saveBtn" onclick="addEntry()">저장</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwGTS9CevFb5Aa0k6508OmQYxvUjuiKNXHOd0QeS3Er4vxEcRNswuFR-nwIOJb_T1S4EQ/exec';

const INCOME_CATS = {
  '근로소득': ['월급','부업'],
  '상여금': ['상여금'],
  '배당소득': ['미국','국내'],
  '이자소득': ['노','파킹','적금'],
  '용돈': ['용돈']
};
const EXPENSE_CATS = {
  '식비': ['외식','카페','장보기','배달'],
  '교통': ['지하철/버스','택시','주유','주차'],
  '주거': ['월세','관리비','인터넷/통신','수도/전기'],
  '쇼핑': ['의류','생활용품','가전/전자','뷰티'],
  '문화': ['영화/공연','도서','구독서비스','스포츠'],
  '의료': ['병원','약국','건강식품'],
  '교육': ['학원','교재','온라인강의'],
  '기타': ['경조사','세금/공과금','기타']
};

const IC = ['#2DB38A','#1A8A63','#3DC9A0','#56D4B0','#0D6B4C'];
const IL = ['#A8E8D4','#D4F3E8','#8ADFC5','#C3F5E8','#7AD0B0'];
const EC = ['#D45D7E','#A83050','#E07A96','#E896AD','#8A1E3C'];
const EL = ['#F5C0D1','#FAD4DE','#F0A0BC','#FDE8EE','#E8A0B4'];

let entries = [], nextId = 1, currentType = 'income';
let selIncome = null, selExpense = null;
let charts = {};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadFromSheet() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('loading'); btn.textContent = '불러오는 중...';
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    entries = data.filter(r => r['날짜'] && r['내역']).map((r,i) => ({
      id: i+1,
      date: String(r['날짜']).slice(0,10),
      type: r['구분']==='소득' ? 'income' : 'expense',
      name: r['내역']||'',
      amount: Number(r['금액'])||0,
      main: r['대분류']||'',
      sub: r['소분류']||''
    }));
    nextId = entries.length+1;
    renderAll();
    showToast('✅ 데이터를 불러왔어요!');
  } catch(e) { showToast('❌ 불러오기 실패. 다시 시도해주세요.'); }
  btn.classList.remove('loading'); btn.textContent = '🔄 불러오기';
}

async function saveToSheet(row) {
  const form = new FormData();
  form.append('data', JSON.stringify(row));
  await fetch(SCRIPT_URL, { method:'POST', body:form });
}

function getTotals(type, cat) {
  const m = {};
  entries.filter(e => e.type===type && (!cat || e.main===cat))
    .forEach(e => { const k = cat ? e.sub : e.main; if(k) m[k]=(m[k]||0)+e.amount; });
  return m;
}

function buildLegend(elId, labels, data, colors) {
  const total = data.reduce((a,b)=>a+b,0);
  document.getElementById(elId).innerHTML = labels.map((l,i)=>`
    <div class="legend-item">
      <div class="legend-left"><span class="legend-dot" style="background:${colors[i%colors.length]}"></span><span class="legend-name">${l}</span></div>
      <span class="legend-pct">${total>0?Math.round(data[i]/total*100):0}% · ${data[i].toLocaleString()}원</span>
    </div>`).join('');
}

function buildDonut(id, labels, data, colors, onClick) {
  if(charts[id]) charts[id].destroy();
  if(!labels.length) return;
  charts[id] = new Chart(document.getElementById(id), {
    type:'doughnut',
    data:{labels, datasets:[{data, backgroundColor:colors, borderWidth:2, borderColor:'#fff', hoverOffset:8}]},
    options:{responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw.toLocaleString()}원`}}},
      onClick: onClick||null}
  });
}

function buildMainCharts() {
  const it = getTotals('income',null), iL=Object.keys(it), iD=Object.values(it);
  buildDonut('incomeMainChart', iL, iD, IC, (_,els) => {
    if(els.length){ selIncome=iL[els[0].index]; buildSubChart('income'); }
  });
  buildLegend('income-main-legend', iL, iD, IC);

  const et = getTotals('expense',null), eL=Object.keys(et), eD=Object.values(et);
  buildDonut('expenseMainChart', eL, eD, EC, (_,els) => {
    if(els.length){ selExpense=eL[els[0].index]; buildSubChart('expense'); }
  });
  buildLegend('expense-main-legend', eL, eD, EC);
}

function buildSubChart(type) {
  const isIncome = type==='income';
  const cat = isIncome ? selIncome : selExpense;
  const colors = isIncome ? IC : EC;
  const lights = isIncome ? IL : EL;
  const t = getTotals(type, cat);
  const labels=Object.keys(t), data=Object.values(t);
  const subColors = labels.map((_,i)=> i===0?colors[0]:lights[i%lights.length]);

  const cardId = isIncome ? 'income-sub-card' : 'expense-sub-card';
  const titleId = isIncome ? 'income-sub-title' : 'expense-sub-title';
  const legendId = isIncome ? 'income-sub-legend' : 'expense-sub-legend';
  const chartId = isIncome ? 'incomeSubChart' : 'expenseSubChart';

  document.getElementById(cardId).style.display = 'block';
  document.getElementById(titleId).textContent = `${cat} · 소분류`;
  document.getElementById('sub-chart-section').style.display = 'grid';

  buildDonut(chartId, labels, data, subColors);
  buildLegend(legendId, labels, data, subColors);
}

function resetChart(type) {
  const isIncome = type==='income';
  if(isIncome) selIncome=null; else selExpense=null;
  document.getElementById(isIncome?'income-sub-card':'expense-sub-card').style.display='none';
  if(!selIncome && !selExpense) document.getElementById('sub-chart-section').style.display='none';
}

function buildTable(type) {
  const el = document.getElementById(type==='income'?'income-table':'expense-table');
  const list = entries.filter(e=>e.type===type).sort((a,b)=>b.date.localeCompare(a.date));
  const colors = type==='income'?IC:EC, lights=type==='income'?IL:EL;
  const mkeys = Object.keys(getTotals(type,null));
  if(!list.length){el.innerHTML='<div class="empty-state">내역이 없어요. 추가해보세요!</div>';return;}
  el.innerHTML = list.map(e=>{
    const ci=mkeys.indexOf(e.main)%colors.length;
    return `<div class="table-row">
      <span class="row-name">${e.name}</span>
      <span class="row-amount ${type}">${e.amount.toLocaleString()}원</span>
      <span><span class="cat-badge" style="background:${lights[ci]||'#eee'};color:${colors[ci]||'#333'}">${e.main}</span></span>
      <span class="row-sub">${e.sub}</span>
      <span class="row-date-del"><span class="row-date">${e.date.slice(5)}</span><button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button></span>
    </div>`;
  }).join('');
}

function updateSummary() {
  const inc = entries.filter(e=>e.type==='income').reduce((a,e)=>a+e.amount,0);
  const exp = entries.filter(e=>e.type==='expense').reduce((a,e)=>a+e.amount,0);
  const net = inc-exp;
  document.getElementById('total-income').textContent = inc.toLocaleString()+'원';
  document.getElementById('income-count').textContent = entries.filter(e=>e.type==='income').length+'건';
  document.getElementById('total-expense').textContent = exp.toLocaleString()+'원';
  document.getElementById('expense-count').textContent = entries.filter(e=>e.type==='expense').length+'건';
  document.getElementById('net-amount').textContent = (net>=0?'+':'')+net.toLocaleString()+'원';
  document.getElementById('net-amount').style.color = net>=0?'#2DB38A':'#D45D7E';
  document.getElementById('net-label').textContent = net>=0?'흑자 😊':'적자 😥';
  const n=new Date();
  document.getElementById('period-label').textContent = `${n.getFullYear()}년 ${n.getMonth()+1}월`;
}

function renderAll() {
  updateSummary();
  buildMainCharts();
  if(selIncome) buildSubChart('income');
  if(selExpense) buildSubChart('expense');
  buildTable('income');
  buildTable('expense');
}

function setType(type) {
  currentType = type;
  document.getElementById('typeIncome').className = 'type-btn'+(type==='income'?' active income':'');
  document.getElementById('typeExpense').className = 'type-btn'+(type==='expense'?' active expense':'');
  document.getElementById('saveBtn').className = 'btn-save '+type;
  const cats = type==='income'?INCOME_CATS:EXPENSE_CATS;
  const sel = document.getElementById('f-main');
  sel.innerHTML = '<option value="">선택하세요</option>'+Object.keys(cats).map(k=>`<option value="${k}">${k}</option>`).join('');
  document.getElementById('f-sub').innerHTML = '<option value="">먼저 대분류를 선택하세요</option>';
}

function updateSubOptions() {
  const cats = currentType==='income'?INCOME_CATS:EXPENSE_CATS;
  const m = document.getElementById('f-main').value;
  const sub = document.getElementById('f-sub');
  if(!m){sub.innerHTML='<option value="">먼저 대분류를 선택하세요</option>';return;}
  sub.innerHTML='<option value="">선택하세요</option>'+(cats[m]||[]).map(s=>`<option value="${s}">${s}</option>`).join('');
}

function openModal() {
  setType('income');
  document.getElementById('f-name').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

async function addEntry() {
  const name=document.getElementById('f-name').value.trim();
  const amount=parseInt(document.getElementById('f-amount').value);
  const main=document.getElementById('f-main').value;
  const sub=document.getElementById('f-sub').value;
  const date=document.getElementById('f-date').value;
  if(!name||!amount||!main||!sub||!date){alert('모든 항목을 입력해주세요');return;}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='저장 중...';
  const row={date, type:currentType==='income'?'소득':'지출', name, amount, main, sub};
  await saveToSheet(row);
  entries.unshift({id:nextId++, type:currentType, date, name, amount, main, sub});
  closeModal(); renderAll();
  showToast('✅ 구글 시트에 저장됐어요!');
  btn.disabled=false; btn.textContent='저장';
}

function deleteEntry(id){entries=entries.filter(e=>e.id!==id);renderAll();}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

loadFromSheet();
</script>
</body>
</html>
